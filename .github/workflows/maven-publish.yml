# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

# https://docs.github.com/en/actions/publishing-packages/publishing-java-packages-with-maven
name: Publish package to the Maven Central Repository

on:
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md
    steps:
      - uses: actions/checkout@main
      
      - name: Set up JDK 17
        uses: actions/setup-java@main
        with:
          java-version: '17'
          distribution: 'liberica'
          server-id: central # Value of the distributionManagement/repository/id field of the pom.xml
          server-username: SERVER_USERNAME
          server-password: SERVER_PASSWORD
          gpg-private-key: GPG_PRIVATE_KEY
          gpg-passphrase: GPG_PASSPHRASE

      - name: Publish package
        run: |
          mvn --batch-mode clean deploy -Dmaven.test.skip=true -Dmaven.javadoc.skip=false -Dgpg.skip=false
        env:
          SERVER_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          SERVER_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
